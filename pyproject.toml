[project]
name = "scraperv2"
version = "0.1.0"
description = "Shared web scraping library: rate-limited async HTTP with obscura render fallback, article/link extraction, RSS/sitemap/discovery, and caching."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Muk Chunpongtong" }]
dependencies = [
    "aiohttp>=3.10",
    "selectolax>=0.3",
    "trafilatura>=1.12",
    "feedparser>=6.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["scraperv2"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
